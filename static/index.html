<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>25時、ナイトコードで。 Panopticon</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#262b36; --text:#e6e8ee;
    --muted:#8a90a2; --ok:#3ecf8e; --warn:#f5a623; --bad:#f0506e; --accent:#5b8cff;
    /* 25時、ナイトコードで。四人の合わせ色（衣装リボンカラー基準） */
    --kanade:#e0526b;  /* 宵崎奏 - 赤 */
    --mafuyu:#5b8cff;  /* 朝比奈まふゆ - 青 */
    --ena:#f0c93b;     /* 東雲絵名 - 黄 */
    --mizuki:#f2a0c4;  /* 暁山瑞希 - ピンク */
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg);color:var(--text)}
  header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .meta{color:var(--muted);font-size:12px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px 28px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;
        border-top:3px solid var(--accent-color, var(--accent));position:relative}
  .card h2{margin:0 0 4px;font-size:15px;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.bad{background:var(--bad)}
  .url{color:var(--muted);font-size:12px;margin-bottom:12px;word-break:break-all}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--border)}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted)}
  .bar{height:6px;border-radius:4px;background:#232732;overflow:hidden;margin-top:3px}
  .bar>span{display:block;height:100%;background:var(--accent)}
  .bar.warn>span{background:var(--warn)} .bar.bad>span{background:var(--bad)}
  .section-title{font-size:12px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.04em}
  table{width:100%;border-collapse:collapse;font-size:12px}
  td,th{padding:3px 4px;text-align:left;border-bottom:1px solid var(--border)}
  .badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:11px}
  .badge.ok{background:rgba(62,207,142,.15);color:var(--ok)}
  .badge.bad{background:rgba(240,80,110,.15);color:var(--bad)}
  .badge.warn{background:rgba(245,166,35,.15);color:var(--warn)}
  .err{color:var(--bad);font-size:12px;white-space:pre-wrap}
  details{margin-top:8px}
  summary{cursor:pointer;color:var(--muted);font-size:11px}
  pre{max-height:200px;overflow:auto;font-size:11px;background:#0c0e13;padding:8px;border-radius:6px}
  #empty{padding:60px;text-align:center;color:var(--muted)}
  header .tagline{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}
  footer{padding:24px 28px;text-align:center;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:12px}
</style>
</head>
<body>
<header>
  <div>
    <h1>25時、ナイトコードで。 <span style="color:var(--muted);font-weight:400">/ Panopticon</span></h1>
    <div class="tagline">正体不明の音楽サークル、今夜も稼働状況を見守る。</div>
  </div>
  <div style="text-align:right">
    <div class="meta" id="updated">加载中…</div>
    <a href="/settings" style="font-size:11px;color:var(--muted)">⚙ 设置</a>
  </div>
</header>
<div id="grid"></div>
<div id="empty" style="display:none">还没配置任何面板，去 <a href="/settings" style="color:var(--accent)">设置页面</a> 添加一个吧。</div>
<footer>25:00 — サーバーの向こう側、今日も奏でる。 · Nightcord Series</footer>

<script>
const REFRESH_MS = 15000;

function fmtBytes(v){
  if(v === undefined || v === null) return '-';
  if(typeof v === 'string') return v;
  const units=['B','KB','MB','GB','TB']; let i=0;
  while(v>=1024 && i<units.length-1){v/=1024;i++;}
  return v.toFixed(1)+units[i];
}

function pct(used,total){
  if(!total) return 0;
  return Math.min(100, Math.round((used/total)*100));
}

function barClass(p){
  if(p>=90) return 'bad';
  if(p>=70) return 'warn';
  return '';
}

const QY_TAG = '<span style="color:var(--muted);font-size:10px;margin-left:4px">青源实时</span>';

function renderSystem(sys, net, qingyuan){
  if(!sys && !net && !qingyuan) return '<div class="err">无数据</div>';
  let html = '';
  if(sys){
    html += `<div class="row"><span class="k">系统</span><span>${sys.system ?? '-'}</span></div>`;
    html += `<div class="row"><span class="k">运行时长</span><span>${sys.time ?? '-'}</span></div>`;
  }
  // 青源 agent 是本机直采，比宝塔面板 API 转发的数据更实时，两边都有时优先用青源的 CPU/内存
  if(qingyuan && qingyuan.cpu !== undefined && qingyuan.cpu !== null){
    html += `<div class="row"><span class="k">CPU${QY_TAG}</span><span>${Number(qingyuan.cpu).toFixed(1)}%</span></div>
      <div class="bar ${barClass(qingyuan.cpu)}"><span style="width:${Math.min(100,qingyuan.cpu)}%"></span></div>`;
  } else if(sys){
    const cpuUsed = sys.cpuRealUsed ?? sys.CpuRealUsed ?? (net && net.cpu ? net.cpu[0] : undefined);
    if(cpuUsed !== undefined){
      html += `<div class="row"><span class="k">CPU</span><span>${Number(cpuUsed).toFixed(1)}%</span></div>
        <div class="bar ${barClass(cpuUsed)}"><span style="width:${Math.min(100,cpuUsed)}%"></span></div>`;
    }
  }
  if(qingyuan && qingyuan.mem !== undefined && qingyuan.mem !== null){
    html += `<div class="row"><span class="k">内存${QY_TAG}</span><span>${Number(qingyuan.mem).toFixed(1)}%</span></div>
      <div class="bar ${barClass(qingyuan.mem)}"><span style="width:${Math.min(100,qingyuan.mem)}%"></span></div>`;
  } else if(sys){
    const memUsed = sys.MemRealUsed ?? sys.memRealUsed;
    const memTotal = sys.MemTotal ?? sys.memTotal;
    if(memUsed !== undefined && memTotal){
      const p = pct(memUsed, memTotal);
      html += `<div class="row"><span class="k">内存</span><span>${memUsed}G / ${memTotal}G</span></div>
        <div class="bar ${barClass(p)}"><span style="width:${p}%"></span></div>`;
    }
  }
  if(net && net.load){
    const l = net.load;
    html += `<div class="row"><span class="k">负载 (1/5/15)</span><span>${l.one} / ${l.five} / ${l.fifteen}</span></div>`;
  }
  if(net){
    html += `<div class="row"><span class="k">网络 ↑/↓</span><span>${fmtBytes(net.up*1024)}/s ↑ &nbsp; ${fmtBytes(net.down*1024)}/s ↓</span></div>`;
  }
  return html || '<div class="err">无数据</div>';
}

function renderIp(p, qingyuan){
  // 内网 IP 只有本机 agent（青源）拿得到；外网 IP 宝塔面板也能靠 url 解析出一个参考值
  const ext = (qingyuan && qingyuan.ip_external) || p.ip_external;
  const int_ = qingyuan && qingyuan.ip_internal;
  if(!ext && !int_) return '';
  const parts = [];
  if(ext) parts.push(`${ext}(外)`);
  if(int_) parts.push(`${int_}(内)`);
  return `<div class="row"><span class="k">IP 地址</span><span>${parts.join(' ')}</span></div>`;
}

function renderDisk(disk, qingyuanDiskPct){
  if((!disk || !disk.length) && qingyuanDiskPct === undefined) return '<div class="err">无数据</div>';
  let html = '<table>';
  let rootShown = false;
  (disk || []).forEach(d=>{
    const size = d.size || [];
    const [total, used, avail, percentStr] = size;
    let p = parseInt(percentStr) || 0;
    let label = percentStr || (p+'%');
    // 挂载目录【/】两边都有数据时，青源直采的更准，覆盖宝塔面板的展示值
    if(d.path === '/' && qingyuanDiskPct !== undefined && qingyuanDiskPct !== null){
      p = qingyuanDiskPct;
      label = `${p.toFixed(1)}%${QY_TAG}`;
      rootShown = true;
    }
    html += `<tr><td>${d.path||'-'}</td><td>${used||'-'}/${total||'-'}</td>
      <td><span class="badge ${p>=85?'bad':'ok'}">${label}</span></td></tr>`;
  });
  if(!rootShown && qingyuanDiskPct !== undefined && qingyuanDiskPct !== null){
    const p = qingyuanDiskPct;
    html += `<tr><td>/</td><td>-</td>
      <td><span class="badge ${p>=85?'bad':'ok'}">${p.toFixed(1)}%${QY_TAG}</span></td></tr>`;
  }
  html += '</table>';
  return html;
}

function renderSites(sites){
  const list = (sites && sites.data) || (Array.isArray(sites) ? sites : null);
  if(!list) return '<div class="err">无数据</div>';
  if(!list.length) return '<div class="row"><span class="k">站点数</span><span>0</span></div>';
  let html = `<div class="row"><span class="k">站点总数</span><span>${list.length}</span></div><table>`;
  list.slice(0,8).forEach(s=>{
    const name = s.name || s.domain || '-';
    const status = (s.status === '1' || s.status === 1 || s.status === true) ? 'ok' : 'bad';
    const statusText = status === 'ok' ? '运行中' : (s.status ?? '未知');
    const edate = s.edate || s.expire || '';
    html += `<tr><td>${name}</td><td><span class="badge ${status}">${statusText}</span></td><td>${edate}</td></tr>`;
  });
  html += '</table>';
  if(list.length > 8) html += `<div class="row"><span class="k"></span><span>… 共 ${list.length} 个站点</span></div>`;
  return html;
}

function renderDatabases(dbs){
  const list = (dbs && dbs.data) || (Array.isArray(dbs) ? dbs : null);
  if(!list) return '<div class="err">无数据</div>';
  return `<div class="row"><span class="k">数据库总数</span><span>${list.length}</span></div>`;
}

const METRICS_RANGE_OPTIONS = [
  {label:'1 小时', hours:1},
  {label:'6 小时', hours:6},
  {label:'24 小时', hours:24},
  {label:'7 天', hours:168},
];
const metricsRangeState = {};

function metricsSlug(panelName){
  return (panelName || '').replace(/[^a-zA-Z0-9_-]/g, c => '_' + c.charCodeAt(0) + '_');
}

function metricsSvg(samples){
  const w = 300, h = 56;
  const series = [
    {k:'cpu', color:'var(--ok)'},
    {k:'mem', color:'var(--accent)'},
    {k:'disk', color:'var(--warn)'},
  ];
  const tsList = samples.map(s=>s.ts);
  const minTs = Math.min(...tsList), maxTs = Math.max(...tsList);
  const span = Math.max(maxTs - minTs, 1);
  const x = t => ((t - minTs) / span) * w;
  const y = v => h - (Math.min(100, Math.max(0, v ?? 0)) / 100) * h;
  const lines = series.map(({k,color}) => {
    const pts = samples.map(s => `${x(s.ts).toFixed(1)},${y(s[k]).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"
    style="background:#0c0e13;border-radius:6px;display:block">${lines}</svg>`;
}

function metricsLegend(last){
  const items = [
    {label:'CPU', color:'var(--ok)', v:last.cpu},
    {label:'内存', color:'var(--accent)', v:last.mem},
    {label:'磁盘', color:'var(--warn)', v:last.disk},
  ];
  return `<div style="display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:4px">
    ${items.map(i=>`<span><span class="dot" style="width:7px;height:7px;background:${i.color}"></span>
      ${i.label} ${i.v!==undefined && i.v!==null ? Number(i.v).toFixed(1)+'%' : '-'}</span>`).join('')}
  </div>`;
}

function metricsRangeSelect(panelName){
  const current = metricsRangeState[panelName] ?? 6;
  const opts = METRICS_RANGE_OPTIONS.map(o=>
    `<option value="${o.hours}" ${o.hours===current?'selected':''}>${o.label}</option>`).join('');
  return `<select onchange="onMetricsRangeChange('${panelName.replace(/'/g,"\\'")}', this.value)"
    style="font-size:11px;background:#0c0e13;color:var(--text);border:1px solid var(--border);border-radius:4px">
    ${opts}
  </select>`;
}

async function loadMetricsHistory(panelName){
  const el = document.getElementById('mtx-' + metricsSlug(panelName));
  if(!el) return;
  const hours = metricsRangeState[panelName] ?? 6;
  try{
    const res = await fetch(`/api/metrics/history?panel=${encodeURIComponent(panelName)}&hours=${hours}`);
    if(!res.ok){ el.innerHTML = ''; return; }
    const data = await res.json();
    const samples = data.samples || [];
    if(samples.length < 2){ el.innerHTML = ''; return; }
    const last = samples[samples.length - 1];
    el.innerHTML = `<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>历史趋势</span>${metricsRangeSelect(panelName)}
      </div>
      ${metricsSvg(samples)}
      ${metricsLegend(last)}`;
  }catch(e){
    el.innerHTML = '';
  }
}

function onMetricsRangeChange(panelName, hours){
  metricsRangeState[panelName] = Number(hours);
  loadMetricsHistory(panelName);
}

function renderNightcordStatus(p){
  const targets = p.targets || [];
  if(!targets.length) return '<div class="err">无监控数据</div>';
  const labelMap = {ok:'正常', degraded:'轻微异常', down:'故障', unknown:'未知'};
  const badgeMap = {ok:'ok', degraded:'warn', down:'bad', unknown:'warn'};
  let html = '<table>';
  targets.forEach(t=>{
    const label = labelMap[t.status] || t.status;
    const badge = badgeMap[t.status] || 'warn';
    html += `<tr><td>${escapeHtml(t.display_name||t.id)}</td><td><span class="badge ${badge}">${label}</span></td></tr>`;
  });
  html += '</table>';
  return html;
}

// 25時、ナイトコードで。四人按面板顺序循环分配强调色，纯装饰用，无实际含义
const NIGHTCORD_MEMBERS = [
  {name: '奏', color: 'var(--kanade)'},
  {name: 'まふゆ', color: 'var(--mafuyu)'},
  {name: '絵名', color: 'var(--ena)'},
  {name: '瑞希', color: 'var(--mizuki)'},
];

function renderCard(p, idx){
  const online = p.online !== false;
  const dot = online ? 'ok' : 'bad';
  const member = NIGHTCORD_MEMBERS[idx % NIGHTCORD_MEMBERS.length];
  const qingyuan = p.qingyuan;
  let body = '';
  if(!online){
    body += `<div class="err">${p.error || (p.kind === 'qingyuan-only' ? '青源 agent 已超过 3 分钟没有上报' : '无法连接该面板')}</div>`;
  }
  if(p.kind === 'nightcord-status'){
    body += `<div class="section-title">监控目标</div>${renderNightcordStatus(p)}`;
  } else if(p.kind === 'qingyuan-only'){
    // 只装了青源、没配对应宝塔面板的机器：没有 sites/databases 这些宝塔才有的数据，卡片简化展示
    body += `<div class="section-title">系统状态</div>${renderSystem(null, null, qingyuan)}`;
    body += renderIp(p, qingyuan);
    body += `<div class="section-title">磁盘</div>${renderDisk(null, qingyuan ? qingyuan.disk : undefined)}`;
    body += `<div id="mtx-${metricsSlug(p.name || '')}"></div>`;
  } else {
    body += `<div class="section-title">系统状态</div>${renderSystem(p.system, p.network, qingyuan)}`;
    body += renderIp(p, qingyuan);
    body += `<div class="section-title">磁盘</div>${renderDisk(p.disk, qingyuan ? qingyuan.disk : undefined)}`;
    body += `<div class="section-title">网站</div>${renderSites(p.sites)}`;
    body += `<div class="section-title">数据库</div>${renderDatabases(p.databases)}`;
    body += `<div id="mtx-${metricsSlug(p.name || '')}"></div>`;
  }
  body += `<details><summary>查看原始数据</summary><pre>${escapeHtml(JSON.stringify(p, null, 2))}</pre></details>`;
  return `<div class="card" style="--accent-color:${member.color}">
    <h2><span class="dot ${dot}"></span>${p.name || '未命名面板'}
      <span style="margin-left:auto;font-size:10px;color:${member.color};font-weight:400">♪ ${member.name}</span>
    </h2>
    <div class="url">${p.url || (p.kind === 'qingyuan-only' ? '仅青源 agent，未配置宝塔面板' : '')}</div>
    ${body}
  </div>`;
}

function escapeHtml(s){
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

async function refresh(){
  try{
    const res = await fetch('/api/status');
    const data = await res.json();
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if(data.error){
      grid.innerHTML = '';
      empty.style.display = 'block';
      empty.innerHTML = `${escapeHtml(data.error)}<br><br>去 <a href="/settings" style="color:var(--accent)">设置页面</a> 配置一下吧。`;
      return;
    }
    const panels = data.panels || [];
    if(!panels.length){
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = panels.map((p, i) => renderCard(p, i)).join('');
    panels.forEach(p => {
      if(p.kind !== 'nightcord-status' && p.name) loadMetricsHistory(p.name);
    });
    document.getElementById('updated').textContent =
      '最后更新: ' + new Date((data.ts||Date.now()/1000)*1000).toLocaleTimeString() + (data.cached ? '（缓存）' : '');
  }catch(e){
    document.getElementById('updated').textContent = '刷新失败: ' + e;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
