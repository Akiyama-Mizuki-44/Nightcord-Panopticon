# 复制为 config.yaml 后填写真实信息，config.yaml 不要提交到公开仓库/分享给他人
#
# 个人单人使用推荐架构：网站端口(80/443)保持公网，面板管理端口改为 18101 且完全对公网关闭，
# 只信任 WireGuard 网段（ufw deny 18101/tcp + ufw allow in on wg0 to any port 18101）。
# 这里的 url 请填面板在 WireGuard 内网里的地址（换成你自己的真实内网 IP），
# 具体防火墙配置见 README「推荐架构」章节。
panels:
  - name: "香港-Web01"
    url: "http://10.10.0.2:18101"      # 面板的 WireGuard 内网地址 + 改过的面板端口（换成你自己的真实值）
    api_key: "在面板设置-API接口中获取的接口密钥"
    verify_ssl: false                 # 流量已在 WireGuard 隧道内加密，面板用自签证书没问题

  - name: "上海-DB01"
    url: "http://10.10.0.3:18101"
    api_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    verify_ssl: false

  # 可继续添加更多面板...

# Nightcord-Status（自建监控服务，xml_status_service.py，端口 8702）接入，跟宝塔面板并列展示成一张独立卡片。
# 目前该接口无鉴权，只信任 WireGuard 网段，url 填它在 WireGuard 网格里的内网地址。
nightcord_status:
  enabled: false
  name: "Nightcord-Status"
  url: "http://10.10.0.4:8702"      # FreePBX（跑 xml_status_service.py 的机器）的 WireGuard 内网地址
  verify_ssl: false

# Dashboard 自身的登录保护（Panopticon 打算长期暴露公网时务必开启）
# 用法：
#   python gen_password_hash.py "你的密码"   # 生成 password_hash，粘到下面
# 也支持 Passkey（免密码，指纹/人脸/安全密钥）登录，密码登录始终保留作为备用方式；
# Passkey 在 /settings 页面里添加，不用手填这里，添加后会自动出现 passkeys 字段。
# 注意：Passkey 需要通过 HTTPS 访问（127.0.0.1/localhost 除外），纯 WireGuard 内网 HTTP 访问用不了。
dashboard_auth:
  enabled: false                # 只在 WireGuard 内网访问、不打算公网暴露时可以设 false
  username: "mizuki"
  password_hash: "用 gen_password_hash.py 生成，不要直接写明文密码"
  max_attempts: 5                # 同一 IP 连续失败这么多次后锁定
  lockout_seconds: 900           # 锁定时长（秒），默认 15 分钟

# 自建监控 agent（agent/metrics_agent.py，跑在各面板服务器上）上报系统指标历史的接收端配置。
# agent 侧的 agent_config.yaml 里 shared_secret 要跟这里填的一致。
metrics_agent:
  enabled: false
  shared_secret: "生成一个随机字符串，agent 和 Panopticon 两边要一致"
  retention_days: 30   # 超过这么多天的历史数据会被自动清理
  # 设置页"一键部署 agent"用来生成 agent_config.yaml 里 report_url 的基础地址。
  # 不填的话会用你点"一键安装"那一刻浏览器访问设置页的地址来猜——如果你是通过
  # SSH 隧道 / 127.0.0.1 访问设置页、但部署目标是别的机器，这个猜测就是错的：
  # agent 会拿到一个只在它自己身上才有意义的地址，上报永远静默失败，也不会有任何报错提示。
  # 强烈建议只要会给"本机以外"的机器装 agent，就把这里填成 agent 那边能访问到 Panopticon 的
  # 真实地址（通常是 WireGuard 内网地址），比如 "http://10.10.0.1:1810"。
  report_url: ""

# 告警通知（面板离线 / CPU / 内存 / 磁盘超阈值时推送）
# 阈值同时适用于宝塔面板和青源（自建 agent，见 metrics_agent 段）上报的机器。
notifications:
  # 同一个问题（比如"面板A的CPU告警"）只在刚触发时发一次，问题没解决之前不会重复推送；
  # 这个值只在"问题解决后又复发"时起作用——两次触发间隔小于它，就当是抖动，先不通知。
  cooldown_seconds: 600

  thresholds:
    cpu: 90    # CPU 使用率 %
    mem: 90    # 内存使用率 %
    disk: 85   # 磁盘使用率 %

  feishu:
    enabled: false
    # 飞书群 -> 设置 -> 群机器人 -> 添加"自定义机器人"，复制 Webhook 地址。
    # 推送的是卡片消息（含 @所有人），机器人要关闭"签名校验"，否则会发送失败。
    webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

  email:
    enabled: false
    smtp_host: "smtp.qq.com"
    smtp_port: 465
    use_ssl: true          # 465 端口通常用 SSL；如用 587 端口把 use_ssl 改 false、use_tls 改 true
    use_tls: false
    username: "your_email@qq.com"
    password: "SMTP授权码（不是邮箱登录密码）"
    from: "your_email@qq.com"
    to:
      - "w_mutsumi@hotmail.com"
